# Hydra configuration for Prompt Diff Visualizer

ollama:
  base_url: "http://localhost:11434"
  timeout: 120
  default_models:
    - "llama3.1:8b"
    - "mistral"
    - "gemma3"
  embedding_model: "nomic-embed-text"
  judge_model: "mistral"

scoring:
  thresholds:
    trivial: 0.95
    minor: 0.85
    moderate: 0.65
    major: 0.40
  # below major threshold = fundamental

inference:
  temperature: 0.7
  max_tokens: 1024
  parallel: true

ui:
  page_title: "Prompt Diff Visualizer"
  page_icon: "🔍"
  layout: "wide"

cli:
  output_format: "rich"   # rich | json | plain
  save_report: false
  report_dir: "./reports"
